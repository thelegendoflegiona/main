<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The LoL Lore Timeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>The Legend of Legiona</h1>

  <div class="filters">
    <button onclick="filterEvents('all')">All</button>
    <button onclick="filterEvents('war')">War</button>
    <button onclick="filterEvents('politics')">Politics</button>
    <button onclick="filterEvents('betrayal')">Betrayal</button>
  </div>
</header>

<div class="timeline" id="timeline"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modal-title"></h2>
    <p id="modal-date"></p>
    <p id="modal-desc"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
